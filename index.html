<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Media Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; }
      header { padding: 1rem 1.5rem; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
      main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
      .btn { background: #2563eb; color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer; font-size: 0.875rem; }
      .btn.secondary { background: transparent; border: 1px solid #4b5563; color: #e5e7eb; }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .tabs { display: flex; gap: 0.5rem; }
      .tab { padding: 0.4rem 0.9rem; border-radius: 999px; border: 1px solid #374151; font-size: 0.8rem; cursor: pointer; background: transparent; color: #e5e7eb; }
      .tab.active { background: #111827; border-color: #60a5fa; }
      .upload-card { border-radius: 0.75rem; border: 1px solid #1f2937; padding: 1rem; margin-bottom: 1.5rem; background: #020617; }
      .field { margin-bottom: 0.8rem; }
      .field label { display: block; margin-bottom: 0.25rem; font-size: 0.8rem; color: #9ca3af; }
      .field input, .field select { width: 100%; padding: 0.4rem 0.5rem; border-radius: 0.375rem; border: 1px solid #374151; background: #020617; color: #e5e7eb; font-size: 0.875rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
      .card { border-radius: 0.75rem; border: 1px solid #1f2937; background: #020617; overflow: hidden; display: flex; flex-direction: column; }
      .card-media { position: relative; background: #020617; aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center; }
      .card-media img, .card-media video { width: 100%; height: 100%; object-fit: cover; }
      .card-body { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.35rem; font-size: 0.8rem; }
      .badge { display: inline-flex; align-items: center; padding: 0.1rem 0.5rem; border-radius: 999px; border: 1px solid #374151; font-size: 0.7rem; gap: 0.25rem; }
      .badge-dot { width: 0.45rem; height: 0.45rem; border-radius: 999px; }
      .badge-dot.image { background: #34d399; }
      .badge-dot.video { background: #fbbf24; }
      .badge-dot.proto { background: #f97316; }
      .meta-row { display: flex; justify-content: space-between; gap: 0.5rem; color: #9ca3af; }
      .card-actions { display: flex; justify-content: space-between; gap: 0.5rem; margin-top: 0.25rem; }
      .empty-state { padding: 2rem; text-align: center; border-radius: 0.75rem; border: 1px dashed #1f2937; color: #6b7280; background: #020617; }
      .error { color: #fca5a5; font-size: 0.8rem; margin-top: 0.4rem; }
      .success { color: #6ee7b7; font-size: 0.8rem; margin-top: 0.4rem; }
      .pill { display: inline-flex; align-items: center; padding: 0.15rem 0.5rem; border-radius: 999px; background: #111827; color: #9ca3af; font-size: 0.7rem; gap: 0.3rem; }
      .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 0.8rem; color: #9ca3af; }

      /* Glass icon buttons for home folders */
      .icon-btns { position: relative; display: flex; flex-wrap: wrap; gap: 1.2rem; justify-content: center; padding: 2rem 0 1rem; }
      .icon-btn { position: relative; width: 150px; height: 150px; background: transparent; border: none; cursor: pointer; padding: 0; }
      .icon-btn__back { position: absolute; inset: 0; border-radius: 1.25rem; filter: blur(18px); opacity: 0.9; }
      .icon-btn__front { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; border-radius: 1.25rem; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(148, 163, 184, 0.45); box-shadow: 0 20px 45px rgba(15, 23, 42, 0.9); backdrop-filter: blur(18px); }
      .icon-btn__icon { font-size: 2rem; margin-bottom: 0.5rem; }
      .icon-btn__label { font-size: 0.8rem; color: #e5e7eb; }
      .icon-btn--active .icon-btn__front { border-color: #facc15; box-shadow: 0 22px 55px rgba(250, 204, 21, 0.25); }

      @media (max-width: 640px) {
        header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
        .tabs { width: 100%; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div style="font-weight: 600; font-size: 0.95rem;">Media Gallery</div>
        <div style="font-size: 0.75rem; color: #9ca3af;">Upload and browse images, videos, and protos</div>
      </div>
      <div class="tabs" id="view-tabs"></div>
    </header>
    <main>
      <div id="root"></div>
    </main>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      function formatBytes(bytes) {
        if (!bytes && bytes !== 0) return "";
        const units = ["B", "KB", "MB", "GB"]; 
        let i = 0; 
        let num = bytes;
        while (num >= 1024 && i < units.length - 1) {
          num /= 1024;
          i++;
        }
        return `${num.toFixed(1)} ${units[i]}`;
      }

      function formatDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return d.toLocaleString();
      }

      function kindLabel(kind) {
        const map = { image: "Image", video: "Video", proto: "Proto", other: "Other" };
        return map[kind] || "Other";
      }

      function kindDotClass(kind) {
        if (kind === "image") return "badge-dot image";
        if (kind === "video") return "badge-dot video";
        if (kind === "proto") return "badge-dot proto";
        return "badge-dot";
      }

      const gradientMapping = {
        blue: "linear-gradient(hsl(223, 90%, 50%), hsl(208, 90%, 50%))",
        purple: "linear-gradient(hsl(283, 90%, 50%), hsl(268, 90%, 50%))",
        red: "linear-gradient(hsl(3, 90%, 50%), hsl(348, 90%, 50%))",
        indigo: "linear-gradient(hsl(253, 90%, 50%), hsl(238, 90%, 50%))",
        orange: "linear-gradient(hsl(43, 90%, 50%), hsl(28, 90%, 50%))",
        green: "linear-gradient(hsl(123, 90%, 40%), hsl(108, 90%, 40%))",
      };

      function GlassIcons({ items, className, activeKey, onSelect }) {
        const getBackgroundStyle = (color) => {
          if (gradientMapping[color]) {
            return { background: gradientMapping[color] };
          }
          return { background: color };
        };

        return (
          <div className={`icon-btns ${className || ""}`}>
            {items.map((item, index) => (
              <button
                key={index}
                className={`icon-btn ${item.customClass || ""} ${
                  item.key === activeKey ? "icon-btn--active" : ""
                }`}
                aria-label={item.label}
                type="button"
                onClick={() => onSelect?.(item.key)}
              >
                <span className="icon-btn__back" style={getBackgroundStyle(item.color)} />
                <span className="icon-btn__front">
                  <span className="icon-btn__icon" aria-hidden="true">
                    {item.icon}
                  </span>
                  <span className="icon-btn__label">{item.label}</span>
                </span>
              </button>
            ))}
          </div>
        );
      }

      const glassIconItems = [
        { key: "upload-file", icon: "📁", color: "blue", label: "Upload file" },
        { key: "upload-images", icon: "🖼️", color: "purple", label: "Upload images" },
        { key: "upload-videos", icon: "🎬", color: "red", label: "Upload videos" },
        { key: "view-gallery", icon: "📚", color: "indigo", label: "View gallery" },
        { key: "favorites", icon: "⭐", color: "orange", label: "Favorites" },
      ];

      function MediaCard({ item, onDeleted }) {
        const isImage = item.kind === "image" && item.mimeType.startsWith("image/");
        const isVideo = item.kind === "video" && item.mimeType.startsWith("video/");
        const isProto = item.kind === "proto";

        const handleDelete = async () => {
          if (!window.confirm("Delete this item?")) return;
          try {
            const res = await fetch(`/api/media/${item.id}`, { method: "DELETE" });
            if (!res.ok) throw new Error("Failed to delete");
            onDeleted?.(item.id);
          } catch (err) {
            alert("Error deleting item");
          }
        };

        return (
          <div className="card">
            <div className="card-media">
              {isImage && <img src={item.downloadUrl} alt={item.originalFilename} />}
              {isVideo && (
                <video src={item.downloadUrl} controls preload="metadata" />
              )}
              {!isImage && !isVideo && (
                <div style={{ textAlign: "center", color: "#6b7280", fontSize: "0.8rem" }}>
                  <div style={{ fontSize: "1.8rem", marginBottom: "0.3rem" }}>📄</div>
                  <div>Proto or other file</div>
                </div>
              )}
            </div>
            <div className="card-body">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "0.5rem" }}>
                <div style={{ fontSize: "0.8rem", fontWeight: 500, wordBreak: "break-all" }}>
                  {item.originalFilename}
                </div>
                <div className="badge">
                  <span className={kindDotClass(item.kind)} />
                  <span>{kindLabel(item.kind)}</span>
                </div>
              </div>
              <div className="meta-row">
                <span>{formatBytes(item.sizeBytes)}</span>
                <span>{formatDate(item.createdAt)}</span>
              </div>
              <div className="card-actions">
                <a href={item.downloadUrl} className="btn" style={{ flex: 1, textAlign: "center", textDecoration: "none" }}>
                  Download
                </a>
                <button className="btn secondary" style={{ flexShrink: 0 }} onClick={handleDelete}>
                  Delete
                </button>
              </div>
            </div>
          </div>
        );
      }

      function UploadSection({ onUploaded, defaultKind = "image", allowedKinds }) {
        const [file, setFile] = useState(null);
        const [kind, setKind] = useState(defaultKind);
        const [status, setStatus] = useState(null);
        const [error, setError] = useState(null);
        const [busy, setBusy] = useState(false);

        const handleSubmit = async (e) => {
          e.preventDefault();
          setStatus(null);
          setError(null);
          if (!file) {
            setError("Choose a file first.");
            return;
          }
          const form = new FormData();
          form.append("file", file);
          form.append("kind", kind);
          setBusy(true);
          try {
            const res = await fetch("/api/upload", { method: "POST", body: form });
            if (!res.ok) {
              const body = await res.json().catch(() => ({}));
              throw new Error(body.error || "Upload failed");
            }
            const data = await res.json();
            setStatus("Uploaded successfully.");
            setFile(null);
            onUploaded?.(data);
          } catch (err) {
            setError(err.message || "Upload failed");
          } finally {
            setBusy(false);
          }
        };

        const options = [
          { value: "image", label: "Image" },
          { value: "video", label: "Video" },
          { value: "proto", label: "Proto" },
          { value: "other", label: "Other" },
        ];

        const allowed = allowedKinds && allowedKinds.length > 0
          ? options.filter((o) => allowedKinds.includes(o.value))
          : options;

        return (
          <div className="upload-card">
            <h2 style={{ fontSize: "0.9rem", marginBottom: "0.75rem" }}>Upload file</h2>
            <form onSubmit={handleSubmit}>
              <div className="field">
                <label>File</label>
                <input
                  type="file"
                  onChange={(e) => setFile(e.target.files[0] || null)}
                />
              </div>
              <div className="field">
                <label>Kind</label>
                <select value={kind} onChange={(e) => setKind(e.target.value)}>
                  {allowed.map((opt) => (
                    <option key={opt.value} value={opt.value}>
                      {opt.label}
                    </option>
                  ))}
                </select>
              </div>
              <button className="btn" type="submit" disabled={busy}>
                {busy ? "Uploading..." : "Upload"}
              </button>
            </form>
            {error && <div className="error">{error}</div>}
            {status && <div className="success">{status}</div>}
          </div>
        );
      }

      function Gallery() {
        const [items, setItems] = useState([]);
        const [page, setPage] = useState(1);
        const [pageSize] = useState(24);
        const [total, setTotal] = useState(0);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);

        const load = async (pageToLoad = page) => {
          setLoading(true);
          setError(null);
          try {
            const res = await fetch(`/api/media?page=${pageToLoad}&pageSize=${pageSize}`);
            if (!res.ok) throw new Error("Failed to load gallery");
            const data = await res.json();
            setItems(data.items || []);
            setPage(data.page || pageToLoad);
            setTotal(data.total || 0);
          } catch (err) {
            setError(err.message || "Failed to load gallery");
          } finally {
            setLoading(false);
          }
        };

        useEffect(() => {
          load(1);
        }, []);

        const handleDeleted = (id) => {
          setItems((prev) => prev.filter((x) => x.id !== id));
          setTotal((t) => Math.max(0, t - 1));
        };

        const totalPages = Math.max(1, Math.ceil(total / pageSize));

        const goPage = (p) => {
          const next = Math.min(Math.max(1, p), totalPages);
          if (next !== page) {
            setPage(next);
            load(next);
          }
        };

        return (
          <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.75rem", gap: "0.5rem" }}>
              <div className="pill">
                <span style={{ width: "0.45rem", height: "0.45rem", borderRadius: "999px", background: "#22c55e" }} />
                <span>{total} item{total === 1 ? "" : "s"}</span>
              </div>
              <button className="btn secondary" onClick={() => load(page)} disabled={loading}>
                Refresh
              </button>
            </div>
            {loading && items.length === 0 && (
              <div className="empty-state">Loading gallery...</div>
            )}
            {error && <div className="error" style={{ marginBottom: "0.75rem" }}>{error}</div>}
            {!loading && items.length === 0 && !error && (
              <div className="empty-state">
                <div style={{ fontSize: "1.6rem", marginBottom: "0.3rem" }}>🖼️</div>
                <div>No media yet. Upload a file to get started.</div>
              </div>
            )}
            {items.length > 0 && (
              <>
                <div className="grid">
                  {items.map((item) => (
                    <MediaCard key={item.id} item={item} onDeleted={handleDeleted} />
                  ))}
                </div>
                <div className="pagination">
                  <button
                    className="btn secondary"
                    onClick={() => goPage(page - 1)}
                    disabled={page <= 1 || loading}
                  >
                    Previous
                  </button>
                  <div>
                    Page {page} of {totalPages}
                  </div>
                  <button
                    className="btn secondary"
                    onClick={() => goPage(page + 1)}
                    disabled={page >= totalPages || loading}
                  >
                    Next
                  </button>
                </div>
              </>
            )}
          </>
        );
      }

      function App() {
        const [active, setActive] = useState("view-gallery");

        return (
          <>
            <div style={{ height: "260px", position: "relative" }}>
              <GlassIcons
                items={glassIconItems}
                className="custom-class"
                activeKey={active}
                onSelect={setActive}
              />
            </div>

            {active === "upload-file" && (
              <UploadSection defaultKind="image" />
            )}
            {active === "upload-images" && (
              <UploadSection defaultKind="image" allowedKinds={["image"]} />
            )}
            {active === "upload-videos" && (
              <UploadSection defaultKind="video" allowedKinds={["video"]} />
            )}
            {active === "view-gallery" && <Gallery />}
            {active === "favorites" && (
              <div className="empty-state">
                Favorites view not wired yet. Use the main gallery for now.
              </div>
            )}
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);

      function renderTabs(active) {
        const container = document.getElementById("view-tabs");
        if (!container) return;
        container.innerHTML = "";
        const button = document.createElement("button");
        button.className = "tab active";
        button.textContent = "Gallery";
        container.appendChild(button);
      }

      renderTabs("gallery");
    </script>
  </body>
</html>
